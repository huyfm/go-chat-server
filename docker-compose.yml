services:
  server:
    build: .
    image: server:latest
    container_name: server
    ports:
      - "5001:5001"
  database:
    image: postgres:17.5-alpine
    container_name: database
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./chatdb.sql:/docker-entrypoint-initdb.d/init.sql
